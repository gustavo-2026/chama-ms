worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream core {
        server core-service:8001;
    }
    
    upstream marketplace {
        server marketplace-service:8002;
    }
    
    upstream payments {
        server payments-service:8003;
    }
    
    upstream notifications {
        server notifications-service:8004;
    }
    
    upstream messaging {
        server messaging-service:8005;
    }

    server {
        listen 80;
        
        # Core Service
        location /api/core/ {
            proxy_pass http://core/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Marketplace Service
        location /api/marketplace/ {
            proxy_pass http://marketplace/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Payments Service
        location /api/payments/ {
            proxy_pass http://payments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Notifications Service
        location /api/notifications/ {
            proxy_pass http://notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Messaging Service (WebSocket support)
        location /ws/ {
            proxy_pass http://messaging/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
